<article class="links">
    <div>
    {{ if .Params.last }}
        <a href="../{{ .Params.last }}">« {{ index hugo.Data.langs .Params.language "last" }}</a>
    {{ end }}
    </div>
    <div><a href="..">{{ index hugo.Data.langs .Params.language "back" }}</a></div>
    <div>
    {{ if .Params.next }}
        <a href="../{{ .Params.next }}">{{ index hugo.Data.langs .Params.language "next" }} »</a>
    {{ end }}
    </div>
</article>
